version: 2

sources:
  - name: raw
    database: ricardo-mtz
    schema: gz_raw_data
    loader: bigquery
    tables:
      - name: sales
        identifier: raw_gz_sales
        description: sales of Greenweez / we have one row per product_id found in each orders_id
        config: 
          loaded_at_field: "CAST(date_date AS TIMESTAMP)"
          freshness:
            warn_after: { count: 90, period: day }
        columns:
           - name: date_date
             description: date of purchase
           - name: orders_id
             description: foreign key to ship
           - name: pdt_id
             description: foreign key to product
           - name: revenue
             description: the amount paid by the customer to purchase the product.
           - name: quantity
             description: the quantity of products purchased for a given order
        tests:
          - unique:
              column_name: "(orders_id || '-' || pdt_id)"
      - name: product
        identifier: raw_gz_product
        description: Greenweez products. Include price and id
        columns:
           - name: products_id
             description: Primary key
             tests:
               - unique
               - not_null
           - name: purchase_price
             description: the purchase price of the product
      - name: ship
        identifier: raw_gz_ship
        description: Shipping details
        columns:
           - name: orders_id
             description: Primary key
             tests:
               - unique
               - not_null
           - name: shipping_fee
             description: the price the customer pays for shipping
           - name: log_cost
             description: the cost of preparing the parcel in the distribution centre/warehouse
           - name: ship_cost
             description: shipping cost paid by Greenweez to the carrier/logistics provider
      - name: adwords
        identifier: raw_gz_adwords
        description: Advertising data from Google Adwords campaigns including cost, impressions and clicks
      - name: bing
        identifier: raw_gz_bing
        description: Advertising data from Bing campaigns including cost, impressions and clicks
      - name: criteo
        identifier: raw_gz_criteo
        description: Advertising data from Criteo campaigns including cost, impressions and clicks
      - name: facebook
        identifier: raw_gz_facebook
        description: Advertising data from Facebook Ads campaigns including cost, impressions and clicks

models:
  - name: int_sales_margin
    description: margin calculation per order
    columns:
      - name: orders_id
        description: orders key
        tests:
          - not_null
      - name: products_id
        description: products key
        tests:
          - not_null
      - name: margin
        description: Margin = Revenue - Purchase_cost
        tests:
          - not_null
      - name: Purchase_cost
        description: Purchase_cost = Quantity * Purchase_price
        tests:
          - not_null
      - name: date_date
        description: date of the order
        tests:
          - not_null
      - name: revenue
        description: sum of revenue per order
        tests:
          - not_null
      - name: quantity
        description: sum of quantity per order
        tests:
          - not_null
    tests:
      - unique:
          column_name: "(orders_id || '-' || products_id)"
  - name: int_orders_operational
    description: operational margin calculation per order
    columns:
      - name: orders_id
        description: primary key
        tests:
          - unique
          - not_null
      - name: date_date
        description: date of the order
        tests:
          - not_null
      - name: operational_margin
        description: operational_margin = margin + shipping_fee - log_cost - ship_cost
      - name: quantity
        description: sum of quantity per order
        tests:
          - not_null
      - name: revenue
        description: sum of revenue per order
        tests:
          - not_null
      - name: purchase_cost
        description: purchase_cost = quantity * purchase_price
        tests:
          - not_null
      - name: margin
        description: margin = revenue - purchase_cost
        tests:
          - not_null
      - name: shipping_fee
        description: the price the customer pays for shipping
      - name: log_cost
        description: the cost of preparing the parcel in the distribution centre/warehouse
      - name: ship_cost
        description: shipping cost paid by Greenweez to the carrier/logistics provider
